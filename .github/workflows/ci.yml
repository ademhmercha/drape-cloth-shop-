name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── CLIENT BUILD ──────────────────────────────────────────────────────────
  build-client:
    name: Client — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: client

      - name: Build (Vite + PWA)
        run: npm run build
        working-directory: client
        env:
          # Placeholder URL — build only checks compilation, not connectivity
          VITE_API_URL: https://placeholder.up.railway.app/api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 1

  # ── SERVER CHECK ──────────────────────────────────────────────────────────
  check-server:
    name: Server — Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: server

      - name: Check JS syntax (all files)
        run: |
          find . -name "*.js" \
            -not -path "./node_modules/*" \
            -not -path "./scripts/*" \
            | xargs node --check
        working-directory: server

      - name: Verify server starts (dry-run)
        run: |
          timeout 8 node -e "
            process.env.PORT = 9999;
            process.env.MONGODB_URI = 'mongodb://localhost/test';
            process.env.JWT_SECRET = 'ci-test-secret-32chars-placeholder';
            process.env.JWT_REFRESH_SECRET = 'ci-test-refresh-32chars-placeholder';
            process.env.CLOUDINARY_CLOUD_NAME = 'test';
            process.env.CLOUDINARY_API_KEY = 'test';
            process.env.CLOUDINARY_API_SECRET = 'test';
            process.env.CLIENT_URL = 'http://localhost:5173';
            process.env.NODE_ENV = 'test';
            // Just verify the module loads without syntax errors
            require('./server.js');
          " || true
        working-directory: server
